# These settings were set by the catalyst build script that automatically
# built this stage.
# Please consult /usr/share/portage/config/make.conf.example for a more
# detailed example.
COMMON_FLAGS="-march=native -O2 -pipe"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${COMMON_FLAGS}"
FCFLAGS="${COMMON_FLAGS}"
FFLAGS="${COMMON_FLAGS}"

RUSTFLAGS="${RUSTFLAGS} -C target-cpu=native"


MAKEOPTS="-j10 -l12"

# EMERGE DEFAULT OPTIONS, mainly enabling binaries
#EMERGE_DEFAULT_OPTS="${EMERGE_DEFAULT_OPTS} --getbinpkg --with-bdeps=y"
#BINPKG_FORMAT="gpkg"
#FEATURES="getbinpkg"


# Allow Portage to build up to 6 packages in parallel
# --load-average=10.8 limits the total system load to prevent overload
# This keeps the system responsive during large build operations
#EMERGE_DEFAULT_OPTS="$EMERGE_DEFAULT_OPTS --jobs=6 --load-average=10.8"

USE="-gnome -gtk3 -gtk4 qt5 qt6 kde plasma bluetooth wifi flatpak wayland dist-kernel discover \
	nvenc dolphin wallpapers wacom appindicator btrfs pipewire \
     	ffmpeg lame fuse ios nvidia openh264 grub alsa jack cuda -telemetry"
ACCEPT_KEYWORDS="amd64"
ACCEPT_LICENSE="* -@EULA"


# NOTE: This stage was built with the bindist USE flag enabled

# This sets the language of build output to English.
# Please keep this setting intact when reporting bugs.
LC_MESSAGES=C.utf8
GRUB_PLATFORMS="efi-64"

# Logging
PORTAGE_ELOG_CLASSES="warn error log"
PORTAGE_ELOG_SYSTEM="save"

